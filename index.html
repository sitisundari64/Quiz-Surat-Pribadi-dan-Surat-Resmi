<!doctype html>
<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Surat Pribadi &amp; Resmi</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Nunito', sans-serif; }
    .page { display: none; opacity: 0; transform: translateY(20px); transition: opacity 0.5s ease, transform 0.5s ease; }
    .page.active { display: flex; opacity: 1; transform: translateY(0); }
    .option-btn { transition: all 0.2s ease; }
    .option-btn:hover { transform: scale(1.02); }
    .option-btn.correct { background: #86efac !important; border-color: #22c55e !important; }
    .option-btn.wrong { background: #fca5a5 !important; border-color: #ef4444 !important; }
    .progress-bar { transition: width 0.4s ease; }
    @keyframes bounce-in { 0% { transform: scale(0.3); opacity: 0; } 50% { transform: scale(1.05); } 100% { transform: scale(1); opacity: 1; } }
    .bounce-in { animation: bounce-in 0.6s ease; }
    @keyframes confetti { 0% { transform: translateY(0) rotate(0); opacity: 1; } 100% { transform: translateY(400px) rotate(720deg); opacity: 0; } }
    .confetti { position: absolute; width: 10px; height: 10px; border-radius: 2px; animation: confetti 3s ease-out forwards; }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app" class="h-full w-full overflow-auto" style="background: linear-gradient(135deg, #e0f2fe 0%, #fef9c3 50%, #fde8d8 100%);"><!-- START PAGE -->
   <div id="page-start" class="page active flex-col items-center justify-center min-h-full p-6">
    <div class="bg-white/80 backdrop-blur rounded-3xl shadow-xl p-8 max-w-md w-full text-center bounce-in">
     <div class="text-6xl mb-4">
      📝
     </div>
     <h1 id="title-text" class="text-2xl font-extrabold text-sky-600 mb-2">Quiz Surat Pribadi &amp; Resmi</h1>
     <p class="text-gray-600 mb-6">Kelas 7 SMP • 30 Pertanyaan</p>
     <div class="mb-6"><label for="name-input" class="block text-left text-sm font-semibold text-gray-700 mb-2">Nama Kamu:</label> <input id="name-input" type="text" placeholder="Masukkan namamu..." class="w-full px-4 py-3 rounded-xl border-2 border-sky-200 focus:border-sky-400 focus:outline-none text-lg">
     </div><button id="btn-start" class="w-full bg-sky-500 hover:bg-sky-600 text-white font-bold py-3 px-6 rounded-xl text-lg transition-all hover:scale-105">Mulai Quiz! 🚀</button>
    </div>
   </div><!-- QUIZ PAGE -->
   <div id="page-quiz" class="page flex-col items-center min-h-full p-4">
    <div class="w-full max-w-lg">
     <div class="flex items-center justify-between mb-3"><span id="q-number" class="text-sm font-bold text-sky-700 bg-sky-100 px-3 py-1 rounded-full">1/30</span> <span id="q-score" class="text-sm font-bold text-amber-700 bg-amber-100 px-3 py-1 rounded-full">Skor: 0</span>
     </div>
     <div class="w-full bg-white/50 rounded-full h-3 mb-4">
      <div id="progress" class="progress-bar h-3 bg-sky-400 rounded-full" style="width:3.3%"></div>
     </div>
     <div class="bg-white/90 backdrop-blur rounded-2xl shadow-lg p-6 mb-4">
      <p id="q-text" class="text-lg font-semibold text-gray-800 leading-relaxed"></p>
     </div>
     <div id="options-container" class="space-y-3"></div>
    </div>
   </div><!-- RESULT PAGE -->
   <div id="page-result" class="page flex-col items-center justify-center min-h-full p-6 relative overflow-hidden">
    <div id="confetti-container" class="absolute inset-0 pointer-events-none"></div>
    <div class="bg-white/90 backdrop-blur rounded-3xl shadow-xl p-8 max-w-md w-full text-center bounce-in relative z-10">
     <div id="result-emoji" class="text-6xl mb-4">
      🎉
     </div>
     <h2 class="text-2xl font-extrabold text-sky-600 mb-2">Hasil Quiz</h2>
     <p id="result-name" class="text-lg text-gray-700 font-semibold mb-4"></p>
     <div id="result-score" class="text-5xl font-extrabold text-amber-500 mb-2"></div>
     <p id="result-detail" class="text-gray-600 mb-4"></p>
     <p id="result-motivation" class="text-lg font-semibold text-peach-600 mb-6 italic"></p><button id="btn-retry" class="w-full bg-sky-500 hover:bg-sky-600 text-white font-bold py-3 px-6 rounded-xl text-lg transition-all hover:scale-105">Coba Lagi 🔄</button>
    </div>
   </div>
  </div>
  <script>
const questions = [
  {q:"Surat pribadi ditujukan kepada...",o:["Instansi pemerintah","Teman atau keluarga","Perusahaan","Organisasi"],a:1},
  {q:"Bagian surat resmi yang berisi nomor surat disebut...",o:["Kepala surat","Pembuka","Isi","Penutup"],a:0},
  {q:"Bahasa dalam surat pribadi bersifat...",o:["Baku dan formal","Santai dan akrab","Ilmiah","Teknis"],a:1},
  {q:"Surat resmi menggunakan bahasa...",o:["Gaul","Daerah","Baku dan formal","Slang"],a:2},
  {q:"Contoh surat pribadi adalah...",o:["Surat undangan rapat","Surat untuk sahabat","Surat keputusan","Surat edaran"],a:1},
  {q:"Kop surat terdapat pada...",o:["Surat pribadi","Surat resmi","Memo","Catatan harian"],a:1},
  {q:"Salam pembuka surat pribadi yang tepat adalah...",o:["Dengan hormat","Hai, apa kabar?","Yang terhormat","Kepada Yth."],a:1},
  {q:"Nomor surat diperlukan dalam...",o:["Surat pribadi","Surat resmi","Diary","Puisi"],a:1},
  {q:"Fungsi surat pribadi adalah...",o:["Memberikan instruksi resmi","Menyampaikan kabar kepada orang terdekat","Mengumumkan kebijakan","Melamar pekerjaan"],a:1},
  {q:"Tanda tangan dan stempel terdapat pada...",o:["Surat pribadi","Surat resmi","Cerpen","Novel"],a:1},
  {q:"Bagian penutup surat pribadi biasanya berisi...",o:["Nomor surat","Lampiran","Harapan atau salam penutup","Tembusan"],a:2},
  {q:"Perihal dalam surat resmi berisi...",o:["Alamat pengirim","Topik/inti surat","Tanda tangan","Salam pembuka"],a:1},
  {q:"Surat resmi yang dikeluarkan sekolah contohnya...",o:["Surat untuk nenek","Surat izin kegiatan","Surat cinta","Kartu pos"],a:1},
  {q:"Ciri khas surat pribadi adalah...",o:["Ada kop surat","Tidak ada nomor surat","Ada tembusan","Menggunakan stempel"],a:1},
  {q:"Lampiran dalam surat resmi artinya...",o:["Halaman tambahan","Dokumen yang disertakan","Tanda tangan","Salam pembuka"],a:1},
  {q:"Tembusan pada surat resmi bertujuan...",o:["Mengirim ke banyak pihak","Menghias surat","Menutup surat","Memberi salam"],a:0},
  {q:"Surat pribadi biasanya ditulis dengan...",o:["Ketikan formal","Tulisan tangan atau ketikan bebas","Mesin tik khusus","Huruf kapital semua"],a:1},
  {q:"Perbedaan utama surat resmi dan pribadi terletak pada...",o:["Warna kertas","Format dan bahasa","Ukuran amplop","Jenis tinta"],a:1},
  {q:"'Dengan hormat' termasuk bagian...",o:["Penutup","Isi","Salam pembuka surat resmi","Kepala surat"],a:2},
  {q:"Surat resmi harus menggunakan ejaan...",o:["Bebas","Yang Disempurnakan (EYD)","Lama","Daerah"],a:1},
  {q:"Siapa yang biasanya menandatangani surat resmi sekolah?",o:["Siswa","Kepala sekolah","Tukang kebun","Penjaga kantin"],a:1},
  {q:"Tanggal surat ditulis di bagian...",o:["Tengah surat","Atas surat","Bawah surat","Tidak perlu"],a:1},
  {q:"Surat pribadi boleh menggunakan bahasa...",o:["Hanya bahasa Inggris","Bahasa daerah atau sehari-hari","Bahasa kode","Bahasa Latin"],a:1},
  {q:"Amplop surat resmi biasanya bertuliskan...",o:["Gambar kartun","Logo instansi","Stiker lucu","Tidak ada tulisan"],a:1},
  {q:"Isi surat pribadi kepada teman bisa berupa...",o:["Perintah resmi","Cerita pengalaman liburan","Laporan keuangan","Berita acara"],a:1},
  {q:"Bagian surat yang berisi 'Hormat saya' adalah...",o:["Pembuka","Penutup","Isi","Kop"],a:1},
  {q:"Surat undangan rapat termasuk jenis surat...",o:["Pribadi","Resmi","Niaga","Lamaran"],a:1},
  {q:"Yang BUKAN ciri surat resmi adalah...",o:["Ada kop surat","Bahasa santai","Ada nomor surat","Bahasa baku"],a:1},
  {q:"Menulis surat pribadi untuk guru sebaiknya tetap...",o:["Sangat santai","Sopan dan hormat","Menggunakan slang","Tanpa salam"],a:1},
  {q:"Tujuan utama belajar menulis surat adalah...",o:["Menghabiskan waktu","Melatih keterampilan komunikasi tertulis","Memenuhi tugas saja","Menghias buku"],a:1}
];

let currentQ = 0, score = 0, playerName = "", answered = false;

const defaultConfig = { quiz_title: "Quiz Surat Pribadi & Resmi", background_color: "#e0f2fe", surface_color: "#ffffff", text_color: "#1e3a5f", primary_action_color: "#0ea5e9", secondary_action_color: "#f59e0b", font_family: "Nunito", font_size: 16 };

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => { p.classList.remove('active'); });
  setTimeout(() => { document.getElementById(id).classList.add('active'); }, 50);
}

function renderQuestion() {
  answered = false;
  const q = questions[currentQ];
  document.getElementById('q-number').textContent = `${currentQ+1}/30`;
  document.getElementById('q-score').textContent = `Skor: ${score}`;
  document.getElementById('progress').style.width = `${((currentQ+1)/30)*100}%`;
  document.getElementById('q-text').textContent = q.q;
  const container = document.getElementById('options-container');
  container.innerHTML = '';
  q.o.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn w-full text-left px-5 py-3 bg-white border-2 border-sky-200 rounded-xl font-semibold text-gray-700 hover:border-sky-400';
    btn.textContent = `${String.fromCharCode(65+i)}. ${opt}`;
    btn.onclick = () => selectAnswer(i, btn);
    container.appendChild(btn);
  });
}

function selectAnswer(idx, btn) {
  if (answered) return;
  answered = true;
  const correct = questions[currentQ].a;
  const btns = document.querySelectorAll('.option-btn');
  if (idx === correct) { btn.classList.add('correct'); score++; }
  else { btn.classList.add('wrong'); btns[correct].classList.add('correct'); }
  setTimeout(() => { currentQ++; if (currentQ < 30) renderQuestion(); else showResult(); }, 1000);
}

function showResult() {
  showPage('page-result');
  document.getElementById('result-name').textContent = `👤 ${playerName}`;
  document.getElementById('result-score').textContent = `${score}/30`;
  document.getElementById('result-detail').textContent = `Kamu menjawab ${score} dari 30 pertanyaan dengan benar!`;
  const pct = (score/30)*100;
  let emoji, msg;
  if (pct >= 90) { emoji = "🏆"; msg = "Luar biasa! Kamu sangat menguasai materi ini!"; }
  else if (pct >= 70) { emoji = "🌟"; msg = "Hebat! Terus tingkatkan kemampuanmu!"; }
  else if (pct >= 50) { emoji = "💪"; msg = "Bagus! Ayo pelajari lagi supaya lebih baik!"; }
  else { emoji = "📚"; msg = "Jangan menyerah! Belajar lagi dan coba kembali ya!"; }
  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-motivation').textContent = msg;
  if (pct >= 70) spawnConfetti();
}

function spawnConfetti() {
  const c = document.getElementById('confetti-container');
  const colors = ['#0ea5e9','#f59e0b','#ec4899','#22c55e','#8b5cf6'];
  for (let i = 0; i < 40; i++) {
    const d = document.createElement('div');
    d.className = 'confetti';
    d.style.left = Math.random()*100+'%';
    d.style.top = '-10px';
    d.style.background = colors[Math.floor(Math.random()*colors.length)];
    d.style.animationDelay = Math.random()*2+'s';
    c.appendChild(d);
  }
}

document.getElementById('btn-start').onclick = () => {
  playerName = document.getElementById('name-input').value.trim() || 'Siswa';
  currentQ = 0; score = 0;
  showPage('page-quiz');
  renderQuestion();
};
document.getElementById('btn-retry').onclick = () => {
  document.getElementById('confetti-container').innerHTML = '';
  currentQ = 0; score = 0;
  showPage('page-start');
};

// Element SDK
window.elementSdk.init({
  defaultConfig,
  onConfigChange: async (config) => {
    const title = config.quiz_title || defaultConfig.quiz_title;
    document.getElementById('title-text').textContent = title;
  },
  mapToCapabilities: (config) => ({
    recolorables: [
      { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
      { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
      { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
      { get: () => config.primary_action_color || defaultConfig.primary_action_color, set: (v) => { config.primary_action_color = v; window.elementSdk.setConfig({ primary_action_color: v }); } },
      { get: () => config.secondary_action_color || defaultConfig.secondary_action_color, set: (v) => { config.secondary_action_color = v; window.elementSdk.setConfig({ secondary_action_color: v }); } }
    ],
    borderables: [],
    fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
    fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } }
  }),
  mapToEditPanelValues: (config) => new Map([["quiz_title", config.quiz_title || defaultConfig.quiz_title]])
});

lucide.createIcons();
</script>

</html>
